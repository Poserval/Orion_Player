name: Build Orion Player APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:  # можно запустить вручную

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: |
          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/android @capacitor/filesystem
          npx cap init OrionPlayer com.orion.player --webDir=.

      - name: Add Android platform
        run: |
          npx cap add android
          npx cap copy
          npx cap sync

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: orion-player-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
