<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Orion Player</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- ЗАСТАВКА (orion_splash.png) -->
    <div id="splash-screen">
        <img src="assets/images/orion_splash.png" alt="Orion Player" class="splash-image">
    </div>

    <!-- ФОН (orion_bg.png) -->
    <div class="background-constellation">
        <img src="assets/images/orion_bg.png" alt="Orion Background" class="bg-image">
    </div>

    <!-- ОСНОВНОЙ ИНТЕРФЕЙС -->
    <div id="app">
        <div class="content">
            <!-- Иконка сверху -->
            <div class="top-icon">
                <img src="assets/images/icon-header.png" alt="Orion">
            </div>

            <!-- СЕТКА КНОПОК 2x2 -->
            <div class="category-grid">
                <div class="category-btn" data-category="music">
                    <span>Музыка</span>
                </div>
                <div class="category-btn" data-category="video">
                    <span>Видео</span>
                </div>
                <div class="category-btn" data-category="images">
                    <span>Изображения</span>
                </div>
                <div class="category-btn" data-category="audiobooks">
                    <span>Аудиокниги</span>
                </div>
            </div>

            <!-- СКРОЛЛИМАЯ ПАНЕЛЬ (НЕДАВНО ДОБАВЛЕННЫЕ) -->
            <div class="recent-files">
                <div class="recent-header">
                    <span class="recent-title">Недавно добавленные</span>
                </div>
                <div class="recent-list" id="recent-list">
                    <!-- Заглушки -->
                    <div class="recent-item">
                        <span class="icon">🎬</span>
                        <span class="name">видео_20250313.mp4</span>
                    </div>
                    <div class="recent-item">
                        <span class="icon">🎵</span>
                        <span class="name">трек_вчера.mp3</span>
                    </div>
                    <div class="recent-item">
                        <span class="icon">🎧</span>
                        <span class="name">книга_глава_3.mp3</span>
                    </div>
                    <div class="recent-item">
                        <span class="icon">🎬</span>
                        <span class="name">видос_с_работы.mp4</span>
                    </div>
                    <div class="recent-item">
                        <span class="icon">🎵</span>
                        <span class="name">новый_трек.flac</span>
                    </div>
                    <div class="recent-item">
                        <span class="icon">🎬</span>
                        <span class="name">фильм_до_конца.mp4</span>
                    </div>
                </div>
            </div>

            <!-- Модалка ссылки -->
            <div id="link-modal" class="modal">
                <div class="modal-content">
                    <h3>Вставьте ссылку</h3>
                    <input type="url" id="url-input" placeholder="https://...">
                    <div class="modal-buttons">
                        <button id="play-url-btn">Играть</button>
                        <button id="close-modal-btn">Отмена</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- ПЛЕЕР -->
        <div id="player-screen" style="display: none;">
            <video id="video-player" controls style="width:100%; height:100%;"></video>
            <audio id="audio-player" controls style="display: none;"></audio>
            <div class="subtitle-btn" id="subtitle-btn" style="display: none;">
                <button id="load-subtitle">📄 Субтитры</button>
                <input type="file" id="subtitle-file" accept=".srt" style="display: none;">
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
